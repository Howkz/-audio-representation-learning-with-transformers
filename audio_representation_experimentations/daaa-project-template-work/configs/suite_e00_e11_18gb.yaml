suite:
  name: "suite_e00_e11_strict_18gb"
  language: "fr"
  report_output: "results/suite/rapport_final_18gb.tex"
  leaderboard_output: "results/suite/leaderboard_screening.csv"
  summary_output: "results/suite/suite_summary.csv"
  report:
    title: "Rapport d'Experimentations sur l'Apprentissage de la representation audio via transformateurs"
    subtitle: "Protocole E00->E11 sous contrainte stricte de stockage (18 Go)"
    authors:
      - "CLAIR Mael"
      - "SABINE Hugo"
      - "CHANTELOUP William"
    program: "Master 2 Algorithmiques et Systemes Intelligents"
    course: "Projet DAAA"
  dataset_policy:
    screening: "subsampled_low_storage_18gb"
    final: "subsampled_low_storage_18gb"
  selection:
    enabled: true
    top_k_from_screening: 5
    seeds: [42, 123]
    leaderboard_output: "results/suite/leaderboard_selection.csv"
  notes:
    - "Contrainte bloquante: stockage total limite a 18 Go."
    - "La suite 18Go remplace le dataset de pretrain pour eviter la generation lourde de splits."
    - "Les phases finale E09-E11 restent en sous-echantillon pour garantir l'executabilite."
    - "Comparabilite externe reduite; comparabilite interne preservee par protocole identique."

experiments:
  - id: "E00"
    enabled: true
    phase: "smoke"
    base_config: "configs/smoke_18gb.yaml"
    seeds: [42]
    title: "Smoke test pipeline (18Go)"
    choice_justification: "Valider la chaine complete avec un profil strictement compatible 18 Go."
    expected_effect: "Validation technique uniquement."
    overrides: {}

  - id: "E01"
    enabled: true
    phase: "screening"
    base_config: "configs/low_storage_18gb.yaml"
    seeds: [42]
    title: "Baseline small MAE"
    choice_justification: "Reference frugale stable sous contrainte 18 Go."
    expected_effect: "Point de comparaison principal."
    overrides: {}

  - id: "E02"
    enabled: true
    phase: "screening"
    base_config: "configs/low_storage_18gb.yaml"
    seeds: [42]
    title: "Small NoMAE"
    choice_justification: "Ablation de pre-entrainement."
    expected_effect: "WER potentiellement degrade si MAE utile."
    overrides:
      training:
        pretrain:
          enabled: false

  - id: "E03"
    enabled: true
    phase: "screening"
    base_config: "configs/low_storage_18gb.yaml"
    seeds: [42]
    title: "Tiny MAE"
    choice_justification: "Architecture plus compacte."
    expected_effect: "Cout reduit, WER potentiellement degrade."
    overrides:
      model:
        dim: 128
        depth: 2
        num_heads: 4
        mlp_ratio: 2.0
        mae_decoder_dim: 64
        mae_decoder_depth: 1
        mae_decoder_heads: 2

  - id: "E04"
    enabled: true
    phase: "screening"
    base_config: "configs/low_storage_18gb.yaml"
    seeds: [42]
    title: "Base MAE"
    choice_justification: "Capacite superieure pour compromis perf/cout."
    expected_effect: "WER possiblement meilleur, cout plus eleve."
    overrides:
      model:
        dim: 256
        depth: 6
        num_heads: 8
        mlp_ratio: 4.0
        mae_decoder_dim: 128
        mae_decoder_depth: 2
        mae_decoder_heads: 4

  - id: "E05"
    enabled: true
    phase: "screening"
    base_config: "configs/low_storage_18gb.yaml"
    seeds: [42]
    title: "Small Learned Positional Embeddings"
    choice_justification: "Ablation sinusoidal vs learned."
    expected_effect: "Impact possible sur sequence modeling."
    overrides:
      model:
        pos_embed: "learned"

  - id: "E06"
    enabled: true
    phase: "screening"
    base_config: "configs/low_storage_18gb.yaml"
    seeds: [42]
    title: "Small Time-Frequency Patching"
    choice_justification: "Ablation patching temps-frequence."
    expected_effect: "Possible gain de representation."
    overrides:
      model:
        patch_strategy: "timefreq"
        patch_freq: 20

  - id: "E07"
    enabled: true
    phase: "screening"
    base_config: "configs/low_storage_18gb.yaml"
    seeds: [42]
    title: "Small MAE mask 0.40"
    choice_justification: "Ablation du ratio de masque."
    expected_effect: "Reconstruction plus facile."
    overrides:
      model:
        mae_mask_ratio: 0.4

  - id: "E08"
    enabled: true
    phase: "screening"
    base_config: "configs/low_storage_18gb.yaml"
    seeds: [42]
    title: "Small MAE mask 0.75"
    choice_justification: "Ablation du ratio de masque."
    expected_effect: "Apprentissage plus difficile."
    overrides:
      model:
        mae_mask_ratio: 0.75

  - id: "E09"
    enabled: true
    phase: "final"
    auto_from_selection_rank: 1
    base_config: "configs/low_storage_18gb.yaml"
    seeds: [42, 123, 456, 789, 1024]
    title: "Final Top-1"
    choice_justification: "Consolidation statistique du meilleur modele."
    expected_effect: "Resultat principal sous contrainte 18 Go."
    overrides: {}

  - id: "E10"
    enabled: true
    phase: "final"
    auto_from_selection_rank: 2
    base_config: "configs/low_storage_18gb.yaml"
    seeds: [42, 123, 456, 789, 1024]
    title: "Final Top-2"
    choice_justification: "Consolidation du deuxieme meilleur modele."
    expected_effect: "Comparaison robuste."
    overrides: {}

  - id: "E11"
    enabled: true
    phase: "final"
    auto_from_selection_rank: 3
    base_config: "configs/low_storage_18gb.yaml"
    seeds: [42, 123, 456, 789, 1024]
    title: "Final Top-3"
    choice_justification: "Consolidation du troisieme meilleur modele."
    expected_effect: "Completer le benchmark final interne."
    overrides: {}
