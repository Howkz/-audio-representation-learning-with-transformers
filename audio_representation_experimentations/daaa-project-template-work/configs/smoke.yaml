experiment:
  name: "audio_transformer_smoke"
  output_dir: "outputs"
  results_dir: "results"
  cache_dir: "data/cache"
  processed_dir: "data/processed"
  checkpoint_every_steps: 1000
  keep_last_checkpoints: 1
  cleanup_pretrain_checkpoints_after_finetune: true
  seeds: [42]

audio:
  sample_rate: 16000
  max_duration_sec: 4.0
  n_mels: 64
  win_length: 400
  hop_length: 160

model:
  dim: 128
  depth: 2
  num_heads: 4
  mlp_ratio: 2.0
  dropout: 0.1
  patch_strategy: "time"
  patch_time: 4
  patch_freq: 64
  max_len: 1024
  pos_embed: "sinusoidal"
  mae_decoder_dim: 64
  mae_decoder_depth: 1
  mae_decoder_heads: 2
  mae_mask_ratio: 0.6

training:
  amp: true
  grad_clip_norm: 1.0
  pretrain:
    enabled: true
    epochs: 1
    batch_size: 2
    grad_accum_steps: 2
    learning_rate: 0.0001
    weight_decay: 0.01
    max_steps: 60
  finetune:
    epochs: 1
    batch_size: 2
    grad_accum_steps: 2
    learning_rate: 0.00015
    weight_decay: 0.01
    max_steps: 80

data:
  num_workers: 1
  precompute_feature_cache: false

datasets:
  pretrain:
    name: "Codec-SUPERB/fluent_speech_commands_synth"
    config: null
    split: "train"
    max_samples: 120
    transcript_key: null
  asr_train:
    name: "openslr/librispeech_asr"
    config: "clean"
    split: "validation.clean"
    max_samples: 120
    transcript_key: "text"
  asr_valid:
    name: "openslr/librispeech_asr"
    config: "clean"
    split: "validation.clean"
    max_samples: 80
    transcript_key: "text"
  asr_tests:
    - name: "openslr/librispeech_asr"
      config: "clean"
      split: "test.clean"
      max_samples: 80
      transcript_key: "text"
