experiment:
  name: audio_transformer_low_storage_E08
  output_dir: outputs
  results_dir: results/experiments/E08
  cache_dir: data/cache
  processed_dir: data/processed
  checkpoint_every_steps: 1000
  keep_last_checkpoints: 1
  cleanup_pretrain_checkpoints_after_finetune: true
  seeds:
  - 42
  id: E08
audio:
  sample_rate: 16000
  max_duration_sec: 6.0
  n_mels: 80
  win_length: 400
  hop_length: 160
model:
  dim: 192
  depth: 4
  num_heads: 6
  mlp_ratio: 3.0
  dropout: 0.1
  patch_strategy: time
  patch_time: 4
  patch_freq: 80
  max_len: 1536
  pos_embed: sinusoidal
  mae_decoder_dim: 96
  mae_decoder_depth: 1
  mae_decoder_heads: 4
  mae_mask_ratio: 0.75
training:
  amp: true
  grad_clip_norm: 1.0
  log_every_steps: 25
  pretrain:
    enabled: true
    epochs: 1
    batch_size: 4
    grad_accum_steps: 2
    learning_rate: 0.0001
    weight_decay: 0.01
    max_steps: 250
  finetune:
    epochs: 1
    batch_size: 2
    grad_accum_steps: 4
    learning_rate: 0.00015
    weight_decay: 0.01
    max_steps: 300
data:
  num_workers: 1
  precompute_feature_cache: false
datasets:
  pretrain:
    name: Codec-SUPERB/fluent_speech_commands_synth
    config: null
    split: train
    max_samples: 500
    transcript_key: null
  asr_train:
    name: openslr/librispeech_asr
    config: clean
    split: train.clean.100
    max_samples: 800
    transcript_key: text
  asr_valid:
    name: openslr/librispeech_asr
    config: clean
    split: validation.clean
    max_samples: 150
    transcript_key: text
  asr_tests:
  - name: openslr/librispeech_asr
    config: clean
    split: test.clean
    max_samples: 150
    transcript_key: text
