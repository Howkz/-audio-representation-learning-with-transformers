suite:
  name: tp2h_r2_vox
  language: fr
  report_output: results/suite/tp2h/R2_VOX/report.md
  leaderboard_output: results/suite/tp2h/R2_VOX/leaderboard.csv
  summary_output: results/suite/tp2h/R2_VOX/summary.csv
  report:
    title: TP 2h stage R2_VOX
    subtitle: R2 VoxPopuli MAE+Aug compacte 2h
  notes:
  - Suite compacte 2h orientee vdigpu.
  - Un stage = une mecanique ou comparaison cle, executee sur 5 seeds via shard pair/triple.
experiments:
- id: R2_VOX
  enabled: true
  phase: final_tp_2h
  base_config: configs/final_tp_2h/core_voxpopuli_2h.yaml
  seeds:
  - 42
  - 123
  - 456
  - 789
  - 1024
  title: R2 VoxPopuli MAE+Aug compacte 2h
  benchmark: voxpopuli
  task: asr
  comparison_label: R2
  input_type: logmel
  pretraining: mae
  augmentation: true
  patch_time: 4
  distillation: none
  probe_enabled: false
  overrides:
    datasets:
      asr_train:
        augmentations:
          enabled: true
          gain_prob: 0.5
          gain_db_max: 6.0
          noise_prob: 0.35
          noise_snr_db_min: 20.0
          noise_snr_db_max: 35.0
          specaugment_prob: 0.35
          num_time_masks: 2
          max_time_mask_frames: 16
          num_freq_masks: 1
          max_freq_mask_bins: 8
