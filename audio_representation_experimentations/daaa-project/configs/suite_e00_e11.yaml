suite:
  name: "suite_e00_e11_low_storage"
  language: "fr"
  report_output: "results/suite/rapport_final.tex"
  leaderboard_output: "results/suite/leaderboard_screening.csv"
  summary_output: "results/suite/suite_summary.csv"
  report:
    title: "Rapport d'Experimentations sur l'Apprentissage de la représentation audio via transformateurs"
    subtitle: "Pré-entraînement MAE et adaptation CTC: étude expérimentale progressive E00→E11"
    authors:
      - "CLAIR Maël"
      - "SABINE Hugo"
      - "CHANTELOUP William"
    program: "Master 2 Algorithmiques et Systèmes Intelligents"
    course: "Projet DAAA"
  dataset_policy:
    screening: "librispeech_only"
    final: "librispeech_only"
  notes:
    - "Screening uniquement sur LibriSpeech pour tenir le budget disque/temps."
    - "VoxPopuli est exclu par défaut de cette suite (extension possible si marge)."
    - "Le cache data est conservé entre expériences."

experiments:
  - id: "E00"
    enabled: true
    phase: "smoke"
    base_config: "configs/smoke.yaml"
    seeds: [42]
    title: "Smoke test pipeline"
    choice_justification: "Valider la chaîne complète data/train/test avec un coût minimal avant toute analyse scientifique."
    expected_effect: "Aucune conclusion de performance; uniquement validation technique et reproductibilité."
    overrides: {}

  - id: "E01"
    enabled: true
    phase: "screening"
    base_config: "configs/low_storage.yaml"
    seeds: [42]
    title: "Baseline small MAE"
    choice_justification: "Établir un point de référence frugal, stable et compatible avec la contrainte 15 Go."
    expected_effect: "Servir de base comparative pour toutes les autres variantes."
    overrides: {}

  - id: "E02"
    enabled: true
    phase: "screening"
    base_config: "configs/low_storage.yaml"
    seeds: [42]
    title: "Small NoMAE"
    choice_justification: "Isoler l'effet du pré-entraînement MAE en supprimant cette phase."
    expected_effect: "WER dégradé vs E01 si MAE apporte une représentation utile."
    overrides:
      training:
        pretrain:
          enabled: false

  - id: "E03"
    enabled: true
    phase: "screening"
    base_config: "configs/low_storage.yaml"
    seeds: [42]
    title: "Tiny MAE"
    choice_justification: "Tester une architecture plus compacte pour maximiser la frugalité."
    expected_effect: "Moins de mémoire/temps, possible dégradation WER."
    overrides:
      model:
        dim: 128
        depth: 2
        num_heads: 4
        mlp_ratio: 2.0
        mae_decoder_dim: 64
        mae_decoder_depth: 1
        mae_decoder_heads: 2

  - id: "E04"
    enabled: true
    phase: "screening"
    base_config: "configs/low_storage.yaml"
    seeds: [42]
    title: "Base MAE"
    choice_justification: "Tester une capacité supérieure pour évaluer le compromis performance/coût."
    expected_effect: "WER potentiellement meilleur, mais coût mémoire/temps plus élevé."
    overrides:
      model:
        dim: 256
        depth: 6
        num_heads: 8
        mlp_ratio: 4.0
        mae_decoder_dim: 128
        mae_decoder_depth: 2
        mae_decoder_heads: 4

  - id: "E05"
    enabled: true
    phase: "screening"
    base_config: "configs/low_storage.yaml"
    seeds: [42]
    title: "Small Learned Positional Embeddings"
    choice_justification: "Comparer sinusoidal vs learned embeddings en gardant le reste fixe."
    expected_effect: "Impact sur la qualité de sequence modeling et le transfert ASR."
    overrides:
      model:
        pos_embed: "learned"

  - id: "E06"
    enabled: true
    phase: "screening"
    base_config: "configs/low_storage.yaml"
    seeds: [42]
    title: "Small Time-Frequency Patching"
    choice_justification: "Tester un patching plus local en fréquence pour enrichir la représentation spectrale."
    expected_effect: "Qualité possiblement meilleure sur certains signaux, avec coût calculé plus élevé."
    overrides:
      model:
        patch_strategy: "timefreq"
        patch_freq: 20

  - id: "E07"
    enabled: true
    phase: "screening"
    base_config: "configs/low_storage.yaml"
    seeds: [42]
    title: "Small MAE mask 0.40"
    choice_justification: "Ablation du ratio de masquage vers un régime plus conservateur."
    expected_effect: "Reconstruction plus facile, transfert potentiellement moins robuste."
    overrides:
      model:
        mae_mask_ratio: 0.4

  - id: "E08"
    enabled: true
    phase: "screening"
    base_config: "configs/low_storage.yaml"
    seeds: [42]
    title: "Small MAE mask 0.75"
    choice_justification: "Ablation du ratio de masquage vers un régime plus agressif."
    expected_effect: "Apprentissage plus difficile; possible gain de robustesse ou dégradation selon capacité."
    overrides:
      model:
        mae_mask_ratio: 0.75

  - id: "E09"
    enabled: true
    phase: "final"
    auto_from_screening_rank: 1
    base_config: "configs/low_storage.yaml"
    seeds: [42, 123, 456, 789, 1024]
    title: "Final Top-1"
    choice_justification: "Consolidation statistique de la meilleure variante screening (5 seeds)."
    expected_effect: "Résultat principal du rapport."
    overrides: {}

  - id: "E10"
    enabled: true
    phase: "final"
    auto_from_screening_rank: 2
    base_config: "configs/low_storage.yaml"
    seeds: [42, 123, 456, 789, 1024]
    title: "Final Top-2"
    choice_justification: "Consolidation statistique de la deuxième meilleure variante screening."
    expected_effect: "Comparaison robuste contre Top-1."
    overrides: {}

  - id: "E11"
    enabled: true
    phase: "final"
    auto_from_screening_rank: 3
    base_config: "configs/low_storage.yaml"
    seeds: [42, 123, 456, 789, 1024]
    title: "Final Top-3"
    choice_justification: "Consolidation statistique de la troisième meilleure variante screening."
    expected_effect: "Compléter le benchmark multi-modèles final."
    overrides: {}
